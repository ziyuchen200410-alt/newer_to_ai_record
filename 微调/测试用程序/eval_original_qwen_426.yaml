### 1. 模型逻辑审计 (锁定 4月22日 原始基座)
model_name_or_path: /data1/student/czy/LLaMA-Factory/models/qwen/Qwen2.5-VL-7B-Instruct

trust_remote_code: true
stage: sft
do_train: false
do_predict: true
finetuning_type: full

### 2. 数据集配置 (统一使用 CMB 数据库)
eval_dataset: cmb_eval
template: qwen
cutoff_len: 1024

### 3. 性能压榨配置 (拉满 4090 利用率)
# 开启 16 倍并行，显著提升吞吐量
per_device_eval_batch_size: 16
predict_with_generate: true
# 统一截断长度，给模型留足生成“思维过程”的空间
max_new_tokens: 64

### 4. 推理逻辑 (锁定贪婪搜索)
do_sample: false
top_p: 1.0

### 5. 输出审计路径
