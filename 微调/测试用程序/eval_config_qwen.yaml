### model
model_name_or_path: /data1/student/czy/LLaMA-Factory/models/qwen/Qwen2.5-VL-7B-Instruct
trust_remote_code: true

### method
stage: sft
do_predict: true

### dataset
eval_dataset: medical_test
template: qwen
cutoff_len: 2048

### generation (关键修改区)
# 1. 物理截止：强制模型在输出少量 Token 后停止，防止“话痨”
max_new_tokens: 15 
# 2. 降低熵值：让模型更确定，减少发散思维，有利于固定格式
temperature: 0.01
top_p: 0.7
# 3. 系统提示：直接注入“格式协议” (部分 LLaMA-Factory 版本支持)
system_prompt: "你是一个医学评估助手。请严格按照‘字母. 选项内容’的格式回答问题，禁止输出任何解释、分析或多余的文字。"

### output
output_dir: saves/original_qwen_constrained_eval
overwrite_output_dir: true
predict_with_generate: true
