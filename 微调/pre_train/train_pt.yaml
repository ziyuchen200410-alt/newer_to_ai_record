### 1. 模型与阶段配置
model_name_or_path: /data1/student/czy/LLaMA-Factory/models/qwen/Qwen2.5-VL-7B-Instruct  # 例如 Qwen2.5-7B
stage: pt                                     # 必须是 pt (Pre-training)
do_train: true
finetuning_type: lora                         # 推荐使用 LoRA 节省显存
dataset: medical_books_all                 # 匹配 dataset_info.json 中的 Key

### 2. 训练效率优化（关键）
cutoff_len: 2048                              # 教材逻辑较深，建议不低于 2048
packing: true                                 # 核心参数：将短文本拼接，提升吞吐并保持语义连贯
flash_attn: fa2                               # 必须开启以降低 $O(n^2)$ 复杂度显存压力

### 3. 超参数设置
per_device_train_batch_size: 4                # 根据你的显存调整
gradient_accumulation_steps: 4                # 增加此值以稳定梯度
learning_rate: 5.0e-5                         # PT 阶段的学习率需谨慎，防止通用能力坍塌
num_train_epochs: 3.0                         # 教材建议反复阅读 3 次
lr_scheduler_type: cosine                     # 余弦退火有助于平滑收敛
warmup_steps: 100                             # 预热期让模型适应医学文本概率分布

### 4. 存储与输出
output_dir: saves/medical_qwen/pt_lora        # 结果保存路径
fp16: true                                    # 开启半精度加速
save_steps: 500          # 每 500 步保存一个 Checkpoint，防止服务器断电导致进度丢失
save_total_limit: 3      # 只保留最近的 3 个模型，节省磁盘空间
logging_steps: 5         # 每 5 步输出一次 Loss，方便你实时监控曲线是否正常
plot_loss: true          # 任务结束后查看 saves 目录下的 loss 图
