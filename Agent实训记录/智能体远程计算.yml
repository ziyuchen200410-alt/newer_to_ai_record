    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(query:\
          \ str, query_history: str, conversation_record: str):\n    \"\"\"\n    节点\
          \ 1.1：多轮意图分类器\n    物理任务：结合对话记录与事实库，判定用户当前动作是“新发起查询”、“补全上轮缺项”还是“闲聊”。\n  \
          \  \"\"\"\n    for key in list(os.environ.keys()):\n        if \"proxy\"\
          \ in key.lower():\n            del os.environ[key]\n\n    HOST = \"host.docker.internal\"\
          \ \n    PORT = 11434\n    \n    # 1. 结构化指令：增加“历史路径”判别逻辑\n    system_content\
          \ = \"\"\"# Role\n南京大学财务意图判定器。\n\n# Intent Matrix & Multi-turn Logic:\n\n\
          - search (1) [发起/深入查询]:\n  * 用户提出新标准请求，或在已有事实基础上追加新的查询动作。\n  * 例子：(空背景)\
          \ -> \"坐火车标准\"；(已知教授) -> \"那去北京的住宿费呢？\"\n\n- supplement (2) [响应式补全]:\n \
          \ * 用户回答了上轮系统提出的补全要求。\n  * 关键判定：若 conversation_record 末尾是系统在询问缺失信息（如：询问职级、经费），用户当前的回答即为\
          \ supplement。\n  * 例子：系统问\"请补充经费性质\" -> 用户回\"横向\"\n\n- chat (3) [闲聊/无关]:\n\
          \  * 礼貌用语或与财务审计无关的内容。\n\n# Output (STRICT JSON):\n{\"intent\": \"search/supplement/chat\"\
          , \"reason\": \"结合对话脉络的判定理由\"}\"\"\"\n\n    # 2. 构造上下文载荷\n    # 物理压缩：只给模型看最近两轮对话，防止干扰\n\
          \    recent_chat = conversation_record[-600:] if conversation_record else\
          \ \"无\"\n    input_data = f\"【已存事实】: {query_history}\\n【近期对话】: {recent_chat}\\\
          n【用户当前输入】: {query}\"\n\n    payload = {\n        \"model\": \"qwen3.5:9b\"\
          ,\n        \"messages\": [\n            {\"role\": \"system\", \"content\"\
          : system_content},\n            {\"role\": \"user\", \"content\": input_data}\n\
          \        ],\n        \"stream\": False, \"think\": False,\n        \"options\"\
          : {\"temperature\": 0, \"format\": \"json\"}\n    }\n    \n    try:\n  \
          \      conn = http.client.HTTPConnection(HOST, PORT, timeout=300)\n    \
          \    conn.request(\"POST\", \"/api/chat\", json.dumps(payload), {\"Content-Type\"\
          : \"application/json\"})\n        res = conn.getresponse()\n        raw_answer\
          \ = res.read().decode('utf-8')\n        conn.close()\n\n        # 解析与清理\n\
          \        content_raw = json.loads(raw_answer).get(\"message\", {}).get(\"\
          content\", \"\").strip()\n        data = json.loads(re.search(r'\\{.*\\\
          }', content_raw, re.DOTALL).group())\n\n        raw_intent = data.get(\"\
          intent\", \"chat\")\n        intent_map = {\"search\": \"1\", \"supplement\"\
          : \"2\", \"chat\": \"3\"}\n        \n        return {\n            \"classification\"\
