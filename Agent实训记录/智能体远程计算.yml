    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(query:\
          \ str, query_history: str, conversation_record: str):\n    \"\"\"\n    节点\
          \ 1.2：精密事实提取器 (Few-shot 增强版)\n    物理任务：1. 修正/补全核算矩阵；2. 物理注入表格(一)或(二)的检索指纹。\n\
          \    \"\"\"\n    for key in list(os.environ.keys()):\n        if \"proxy\"\
          \ in key.lower():\n            del os.environ[key]\n\n    HOST = \"host.docker.internal\"\
          \ \n    PORT = 11434\n    \n    # 1. 构造 Few-shot 引导指令\n    system_content\
          \ = \"\"\"# Role\n南京大学财务事实精密提取员。\n\n# Task:\n对比【已有事实】与【新输入】，更新事实状态并判定审计主题。\n\
          \n# Few-shot Examples (逻辑对撞示例):\n\n- 示例 1 [地址补全联动 - 判定为both]:\n  * 已有事实:\
          \ {\"职级\": \"教授\", \"目的地\": \"未知\", \"经费性质\": \"未知\"}\n  * 新输入: \"我要去北京\"\
          \n  * 输出: {\n      \"facts\": {\"职级\": \"教授\", \"目的地\": \"北京\", \"经费性质\"\
          : \"未知\"}, \n      \"topic\": \"both\"\n    }\n\n- 示例 2 [住宿专项判定]:\n  * 已有事实:\
          \ {\"职级\": \"副教授\", \"目的地\": \"南京\", \"经费性质\": \"未知\"}\n  * 新输入: \"在那边住宾馆每天限额多少？\"\
          \n  * 输出: {\n      \"facts\": {\"职级\": \"副教授\", \"目的地\": \"南京\", \"经费性质\"\
          : \"未知\"}, \n      \"topic\": \"accommodation\"\n    }\n\n- 示例 3 [交通工具判定]:\n\
          \  * 已有事实: {\"职级\": \"讲师\", \"目的地\": \"上海\", \"经费性质\": \"未知\"}\n  * 新输入:\
          \ \"用横向结题经费，能坐高铁吗？\"\n  * 输出: {\n      \"facts\": {\"职级\": \"讲师\", \"目的地\"\
          : \"上海\", \"经费性质\": \"横向科研\"}, \n      \"topic\": \"transportation\"\n \
          \   }\n\n- 示例 4 [冲突与地址更新 - 判定为both]:\n  * 已有事实: {\"职级\": \"正高\", \"目的地\"\
          : \"南京\", \"经费性质\": \"纵向\"}\n  * 新输入: \"目的地改去西安\"\n  * 输出: {\n      \"facts\"\
          : {\"职级\": \"正高\", \"目的地\": \"西安\", \"经费性质\": \"纵向\"}, \n      \"topic\"\
          : \"both\"\n    }\n\n# Mapping Rules:\n1. 职级映射: \"杰青/长江/登峰A\" -> 院士/二级教授级别;\
          \ \"登峰B/优青\" -> 正高/副高级别。\n2. 经费映射: \"横向/结题/公司钱\" -> 横向科研。\n3. 主题判定: 涉及交通工具/票价\
          \ -> transportation; 涉及酒店/房费 -> accommodation; 都有 -> both。\n\n# Output (STRICT\
          \ JSON):\n{\"facts\": {...}, \"topic\": \"transportation/accommodation/both/none\"\
          }\"\"\"\n\n    input_data = f\"【已有事实】: {query_history}\\n【新输入】: {query}\"\
          \n\n    payload = {\n        \"model\": \"qwen3.5:9b\",\n        \"messages\"\
          : [\n            {\"role\": \"system\", \"content\": system_content},\n\
          \            {\"role\": \"user\", \"content\": input_data}\n        ],\n\
          \        \"stream\": False, \"think\": False,\n        \"options\": {\"\
          temperature\": 0, \"format\": \"json\"}\n    }\n    \n    try:\n       \
          \ conn = http.client.HTTPConnection(HOST, PORT, timeout=300)\n        conn.request(\"\
          POST\", \"/api/chat\", json.dumps(payload), {\"Content-Type\": \"application/json\"\
          })\n        res = conn.getresponse()\n        raw_answer = res.read().decode('utf-8')\n\
          \        conn.close()\n\n        # --- [物理升级]：解析全文并提取 Token 指标 ---\n   \
          \     full_res = json.loads(raw_answer)\n        input_tokens = full_res.get(\"\
          prompt_eval_count\", 0)\n        output_tokens = full_res.get(\"eval_count\"\
          , 0)\n        total_tokens = input_tokens + output_tokens\n\n        # 2.\
          \ 健壮解析与指纹注入\n        content_raw = full_res.get(\"message\", {}).get(\"\
          content\", \"\").strip()\n        data = json.loads(re.search(r'\\{.*\\\
          }', content_raw, re.DOTALL).group())\n\n        # 物理指纹：强制注入检索增强词\n     \
          \   fingerprint_t1 = \"（一）出差人员乘坐城市间交通工具应不超过以下标准\"\n        fingerprint_t2\
          \ = \"（二）南京大学国（境）内差旅住宿费限额标准明细表\"\n        \n        topic = data.get(\"\
          topic\", \"none\")\n        injected_headers = []\n        if topic in [\"\
          transportation\", \"both\"]:\n            injected_headers.append(fingerprint_t1)\n\
          \        if topic in [\"accommodation\", \"both\"]:\n            injected_headers.append(fingerprint_t2)\n\
          \        \n        # 3. 构造 Refine Query\n        current_facts = data.get(\"\
          facts\", {})\n        # 拼接检索词：指纹关键词 + 更新后的事实 + 原始提问\n        fact_slice\
          \ = f\"{current_facts.get('职级','')} {current_facts.get('目的地','')} {current_facts.get('经费性质','')}\"\
          \n        refine_query = f\"{' '.join(injected_headers)} {fact_slice} {query}\"\
          .strip()\n\n        return {\n            \"detected_facts\": json.dumps(current_facts,\
          \ ensure_ascii=False),\n            \"refine_query\": refine_query,\n  \
          \          \"logic_warning\": f\"【事实更新成功】已挂载 {topic} 物理指纹。\",\n        \
          \    # --- 返回 Token 消耗数据 ---\n            \"input_tokens\": str(input_tokens),\n\
          \            \"output_tokens\": str(output_tokens),\n            \"total_tokens\"\
          : str(total_tokens)\n        }\n        \n    except Exception as e:\n \
          \       return {\n            \"detected_facts\": query_history, \n    \
          \        \"refine_query\": query, \n            \"logic_warning\": f\"EXTRACTION_FAILURE:\
          \ {str(e)}\",\n            \"input_tokens\": \"0\",\n            \"output_tokens\"\
          : \"0\",\n            \"total_tokens\": \"0\"\n        }"
        code_language: python3
        outputs:
