        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(old_table:\
          \ str, new_table: str):\n    \"\"\"\n    逻辑审计（物理锁死版）：\n    1. 冲突判定：New 非空\
          \ 且 New != Old -> 物理清空 \"\"。\n    2. 维持判定：New 为空 -> 100% 物理保留 Old 值。\n \
          \   3. 增量判定：Old 为空 且 New 非空 -> 填入 New。\n    4. 维度对齐：[1.职级 | 2.目的地 | 3.交通工具\
          \ | 4.事由 | 5.经费性质]\n    \"\"\"\n    # [1] 物理环境清理\n    for k in list(os.environ.keys()):\n\
          \        if \"proxy\" in k.lower():\n            del os.environ[k]\n\n \
          \   HOST, PORT = \"host.docker.internal\", 11434\n\n    # [2] 强约束对撞指令 (包含核心逻辑示例)\n\
          \    SYSTEM_PROMPT = \"\"\"# Role\n财务矩阵对撞专家。只输出 JSON，严禁输出 <think>。\n\n#\
          \ Dimensions (5 Slots):\n1.rank | 2.dest | 3.trans | 4.reason | 5.fund\n\
          \n# Logic Matrix (严格执行):\n| 场景 | Old位点 | New位点 | 最终输出 | 审计分类 |\n| :--- |\
          \ :--- | :--- | :--- | :--- |\n| **维持** | 有值 | 为空(\"\") | **保留Old值** | 无\
          \ |\n| **补全** | 为空(\"\") | 有值 | **采用New值** | added |\n| **冲突** | 有值 | 不同新值\
          \ | **清空(\"\")** | conflicted |\n| **一致** | 有值 | 相同新值 | **保留原值** | 无 |\n\
          \n# Important constraint:\n- 如果 New table 里的位点是空的（即只有空格或\"\"），**严禁**将其视为冲突，必须保留\
          \ Old table 里的原件。\n- 只有当 New 提供了**具体的不同词汇**（如：火车 vs 飞机）时，才清空该维度。\n\n# Few-shot\
          \ Example:\n- **Old**: \"| 正高 | 北京 | 飞机 | 出差 | 行政事业 |\"\n- **New**: \"|\
          \ | | 火车 | | |\"\n- **Internal Logic**: \n  Slot 1,2,4,5 in New are EMPTY\
          \ -> Maintain Old values.\n  Slot 3 (trans) is \"火车\" vs \"飞机\" -> Conflict\
          \ -> Set to \"\".\n- **Final Vector**: [\"正高\", \"北京\", \"\", \"出差\", \"\
          行政事业\"]\n- **Conflicted**: [\"交通工具\"]\n\n# Output JSON Structure:\n{\n \
          \ \"vector\": [\"值1\", \"值2\", \"值3\", \"值4\", \"值5\"],\n  \"added\": [\"\
          维度名\"],\n  \"conflicted\": [\"维度名\"]\n}\"\"\"\n\n    payload = {\n     \
          \   \"model\": \"qwen3.5:9b\",\n        \"messages\": [\n            {\"\
          role\": \"system\", \"content\": SYSTEM_PROMPT},\n            {\"role\"\
          : \"user\", \"content\": f\"【Old Matrix】: {old_table}\\n【New Matrix】: {new_table}\"\
          }\n        ],\n        \"stream\": False, \"think\": False,\n        \"\
          options\": {\"temperature\": 0, \"format\": \"json\"}\n    }\n\n    try:\n\
          \        conn = http.client.HTTPConnection(HOST, PORT, timeout=300)\n  \
          \      conn.request(\"POST\", \"/api/chat\", json.dumps(payload), {\"Content-Type\"\
          : \"application/json\"})\n        res = conn.getresponse()\n        raw_data\
          \ = res.read().decode('utf-8')\n        conn.close()\n\n        # [物理审计]：提取原始响应以获取\
          \ Token 计数\n        full_res = json.loads(raw_data)\n        input_tokens\
          \ = full_res.get(\"prompt_eval_count\", 0)\n        output_tokens = full_res.get(\"\
          eval_count\", 0)\n        total_tokens = input_tokens + output_tokens\n\n\
          \        # [3] 解析与物理对齐\n        ai_res = full_res.get(\"message\", {}).get(\"\
          content\", \"\").strip()\n        # 物理切除思维链内容，确保 JSON 纯度\n        clean_json\
          \ = re.sub(r'<think>.*?</think>', '', ai_res, flags=re.DOTALL).strip()\n\
          \        data = json.loads(re.search(r'\\{.*\\}', clean_json, re.DOTALL).group())\n\
          \n        # 维度清洗（去除残留维度名）\n        raw_vec = data.get(\"vector\", [\"\"\
          , \"\", \"\", \"\", \"\"])\n        # 补充位点\n        while len(raw_vec) <\
          \ 5: raw_vec.append(\"\")\n        \n        # [4] 标题持久化（Python 强制扫描）\n\
          \        TITLES = [\"（一）出差人员乘坐城市间交通工具应不超过以下标准\", \"（二）南京大学国（境）内差旅住宿费限额标准明细表\"\
          ]\n        detected = [f\"[{t}]\" for t in TITLES if t in old_table or t\
          \ in new_table]\n        suffix = \" \".join(detected)\n\n        # [5]\
          \ 最终输出构造\n        final_vec = [str(v).strip() for v in raw_vec[:5]]\n  \
          \      final_table = f\"| {' | '.join(final_vec)} | {suffix}\".strip()\n\
          \        final_table = re.sub(r'\\s\\|\\s$', '', final_table)\n\n      \
          \  # 构造审计报告\n        added = data.get(\"added\", [])\n        conflicted\
          \ = data.get(\"conflicted\", [])\n        report = []\n        if conflicted:\
          \ report.append(f\"❗ **冲突清空**: [{', '.join(conflicted)}] 维度信息矛盾，已执行物理归零。\"\
          )\n        if added: report.append(f\"✅ **新信息加入**: [{', '.join(added)}]\
          \ 维度已并入矩阵。\")\n\n        return {\n            \"final_table\": final_table,\n\
          \            \"audit_report\": \" | \".join(report) if report else \"【状态】信息已融合，矩阵收敛。\"\
