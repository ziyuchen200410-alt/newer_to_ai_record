    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(query:\
          \ str):\n    \"\"\"\n    节点 3：专业咨询引导\n    逻辑：当输入模糊或偏离业务时，以资深财务顾问的身份提供逻辑补全建议。\n\
          \    \"\"\"\n    for key in list(os.environ.keys()):\n        if \"proxy\"\
          \ in key.lower():\n            del os.environ[key]\n\n    HOST = \"host.docker.internal\"\
          \ \n    PORT = 11434\n    \n    # 核心指令：将“冷峻”升级为“资深顾问式温和”\n    system_content\
          \ = \"\"\"# Role\n你是一位资深的“南京大学财务报销政策咨询顾问”。你对《南京大学常见财务报销业务指南》有极高的专业理解，语气专业且富有引导性。\n\
          \n# Task\n1. **意图挖掘**：即便用户表述简单（如“北京差旅”），也要识别出背后的业务需求，不要轻易判定为无关闲聊。\n2. **逻辑要素审计**：针对不完整的请求，应专业地指出核算该业务所需的必备因子。\n\
          \   - 差旅费业务：提醒用户核算需锚定[人员类别(一/二/三类)]、[经费性质]及[交通工具等级]。\n   - 劳务/办公业务：提醒用户明确具体的[业务性质]。\n\
          3. **专业拒绝**：若输入完全脱离财务领域（如：询问非业务问题），应以礼貌且专业的方式告知服务边界，并引导用户回到报销咨询。\n\n# Terminology\
          \ Alignment (术语对齐)\n- 必须精准使用：一类/二类/三类人员、城市间交通费、住宿费限额、伙食补助费包干。\n\n# Tone\
          \ & Style\n- 语气：专业、客观、从容。\n- 策略：不使用生硬的拒绝词，改用“为了给您提供更精确的核算建议，请明确...”或“目前的要素尚不足以判定标准，建议补充...”\n\
          - 严禁任何情绪化的夸奖，保持资深顾问的职业克制。\"\"\"\n\n    payload = {\n        \"model\": \"\
          qwen3.5:9b\",\n        \"messages\": [\n            {\"role\": \"system\"\
          , \"content\": system_content},\n            {\"role\": \"user\", \"content\"\
          : f\"用户当前输入: {query}\"}\n        ],\n        \"stream\": False,\n      \
          \  \"think\": False,\n        \"options\": {\n            \"temperature\"\
          : 0.2, # 锁定低随机性，确保专业稳重\n            \"num_predict\": 400\n        }\n  \
          \  }\n    \n    try:\n        conn = http.client.HTTPConnection(HOST, PORT,\
          \ timeout=40)\n        conn.request(\"POST\", \"/api/chat\", json.dumps(payload),\
          \ {\"Content-Type\": \"application/json\"})\n        res = conn.getresponse()\n\
          \        raw_data = res.read().decode('utf-8')\n        conn.close()\n \
          \       \n        # [物理审计]：解析完整响应体以提取 Token 计数\n        full_res = json.loads(raw_data)\n\
          \        input_tokens = full_res.get(\"prompt_eval_count\", 0)\n       \
          \ output_tokens = full_res.get(\"eval_count\", 0)\n        total_tokens\
          \ = input_tokens + output_tokens\n        \n        llm_answer = full_res.get(\"\
          message\", {}).get(\"content\", \"\").strip()\n        \n        # 物理切除思维链\n\
          \        answer = re.sub(r'<think>.*?</think>', '', llm_answer, flags=re.DOTALL).strip()\n\
          \        \n        return {\n            \"answer\": answer,\n         \
          \   \"input_tokens\": str(input_tokens),\n            \"output_tokens\"\
          : str(output_tokens),\n            \"total_tokens\": str(total_tokens)\n\
          \        }\n        \n    except Exception as e:\n        # 异常链路物理熔断，Token\
          \ 计数归零\n        return {\n            \"answer\": \"由于系统连接波动，暂时无法为您提供详细引导。为确保核算准确，建议您补充：人员职级、经费性质及具体报销科目。\"\
          ,\n            \"input_tokens\": \"0\",\n            \"output_tokens\":\
          \ \"0\",\n            \"total_tokens\": \"0\"\n        }"
        code_language: python3
