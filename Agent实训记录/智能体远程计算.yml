    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(result:\
          \ list, refine_query: str):\n    \"\"\"\n    节点 1.2：非结构化规则识别器 (物理脱水版)\n\
          \    物理任务：剔除纯表格块，深度挖掘文字段落中的高影响审计条文。\n    \"\"\"\n    for key in list(os.environ.keys()):\n\
          \        if \"proxy\" in key.lower():\n            del os.environ[key]\n\
          \n    HOST = \"host.docker.internal\" \n    PORT = 11434\n    \n    # 1.\
          \ 物理拦截：剔除纯矩阵数据，保留文字说明\n    # 定义表格指纹，用于识别并跳过已由 Node 1.1 处理过的内容\n    T1_SIG\
          \ = \"（一）出差人员乘坐城市间交通工具应不超过以下标准\"\n    T2_SIG = \"（二）南京大学国（境）内差旅住宿费限额标准明细表\"\
          \n    \n    rule_segments = []\n    for item in result:\n        content\
          \ = item.get('content', '')\n        # 如果不是纯表格块，或者虽然有标题但带有大量文字说明，则保留\n \
          \       # 物理判定：若片段长度大于 100 字符且不全是表格符号，则视为规则段落\n        if T1_SIG not in\
          \ content[:50] and T2_SIG not in content[:50]:\n            rule_segments.append(content)\n\
          \        elif \"注：\" in content or \"说明：\" in content:\n            # 保留表格下方的特殊说明文字\n\
          \            rule_segments.append(content)\n\n    if not rule_segments:\n\
          \        return {\"rule_audit_info\": \"未探测到特殊文字规则。\", \"has_rules\": \"\
          false\"}\n\n    full_text_context = \"\\n---\\n\".join(rule_segments)[:6000]\n\
          \n    # 2. 构造提示词：注入逻辑例外示例 (Few-shot)\n    system_content = \"\"\"# Role\n\
          南京大学财务政策核算员。你的任务是从非表格文字中提取“高影响条文”。\n\n# Audit Priority (规则重要度):\n1. **上浮条款**：如“竞争性科研经费住宿费可上浮\
          \ 50%”。\n2. **例外豁免**：如“夕发朝至列车不受级别限制”。\n3. **硬性约束**：如“必须使用公务卡”、“原则上不单独报销住宿费”。\n\
          4. **身份重叠**：如“管理岗兼专业技术岗使用行政经费按管理岗执行”。\n\n# Few-shot Examples:\n\n- 示例 1\
          \ [上浮规则]:\n  * 段落: \"...使用竞争性科研经费出差，住宿费可按人员类别对应的标准上浮 50%...\"\n  * 提取: 【经费上浮】使用竞争性科研经费，住宿限额允许上浮\
          \ 50%，但不得超过一类标准。\n\n- 示例 2 [交通例外]:\n  * 段落: \"...对于夕发朝至的全列软席火车，乘坐普通软席时，不受级别限制。\"\
          \n  * 提取: 【交通豁免】乘坐夕发朝至全列软席，所有人员均可报销软席票。\n\n- 示例 3 [票据约束]:\n  * 段落: \"...城市间交通费票据遗失的，须填写发票遗失说明并履行审批手续...\"\
          \n  * 提取: 【程序约束】票据遗失需履行专项审批手续，否则不予报销。\n\n# Output (Strict JSON):\n{\n  \"\
          key_rules\": [\"提取出的规则 1\", \"提取出的规则 2\"],\n  \"impact_analysis\": \"这些规则如何影响当前的报销限额（例如：导致限额变宽或手续变严）\"\
          \n}\"\"\"\n\n    payload = {\n        \"model\": \"qwen3.5:9b \",\n    \
          \    \"messages\": [\n            {\"role\": \"system\", \"content\": system_content},\n\
          \            {\"role\": \"user\", \"content\": f\"【文字规则段落】：\\n{full_text_context}\\\
          n\\n【用户事实与需求】：\\n{refine_query}\"}\n        ],\n        \"stream\": False,\
          \ \"think\": False,\n        \"options\": {\"temperature\": 0, \"format\"\
          : \"json\", \"num_predict\": 1000}\n    }\n    \n    try:\n        conn\
          \ = http.client.HTTPConnection(HOST, PORT, timeout=300)\n        conn.request(\"\
          POST\", \"/api/chat\", json.dumps(payload), {\"Content-Type\": \"application/json\"\
          })\n        res = conn.getresponse()\n        raw_data = res.read().decode('utf-8')\n\
          \        conn.close()\n        \n        # [物理审计]：解析完整响应体以提取 Token 计数\n\
