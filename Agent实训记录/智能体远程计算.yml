    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(refine_query:\
          \ str):\n    \"\"\"\n    节点：信息存储标准化算子 (维度强力提取版)\n    物理修正：\n    1. 强制提取“坐飞机”、“乘高铁”中的核心交通工具词。\n\
          \    2. 严格执行“脱水”指令，物理切除所有自然语言废话。\n    \"\"\"\n    # [1] 物理环境清理\n    for\
          \ k in [k for k in os.environ if \"proxy\" in k.lower()]:\n        del os.environ[k]\n\
          \n    HOST, PORT = \"host.docker.internal\", 11434\n\n    # [2] 强力脱水提示词\
          \ (物理锚定逻辑)\n    SYSTEM_PROMPT = \"\"\"# Role\n南京大学财务数据标准化算子。\n\n# Task:\
          \ Standardize & Dehydrate\n1. **维度提取**：从输入中识别 [职级、目的地、交通工具、事由、经费性质]。\n \
          \  - 特别注意：将“坐飞机”、“乘火车”、“飞往”等动作，物理简化为名词（飞机、火车等）。\n2. **物理脱水**：输出结果**严禁**包含任何用户原始的自然语言句子（如“教授坐飞机...”）。\n\
          3. **格式对齐**：必须且仅能输出以下格式。\n\n# Output Format Matrix:\n（一）出差人员乘坐城市间交通工具应不超过以下标准\
          \ | [职级] | [目的地] | [交通工具] | [事由] | [经费性质]\n\n# Few-shot Example (逻辑纠偏):\n\
          - 输入: \"（一）...标准 正高 北京 待核实 教授坐飞机去北京\"\n- 提取: 职级=正高, 目的地=北京, 交通工具=飞机, 事由=出差\n\
          - 输出: （一）出差人员乘坐城市间交通工具应不超过以下标准 | 正高 | 北京 | 飞机 | 出差 | 待核实\n\n# Constraints:\n\
          - 严禁输出 <think>。\n- 严禁保留原始描述性文本。\n- 冲突项设为 \"待核实\"。\" \"\"\"\n\n    payload\
          \ = {\n        \"model\": \"qwen3.5:9b\",\n        \"messages\": [\n   \
          \         {\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n        \
          \    {\"role\": \"user\", \"content\": f\"【待处理事实流】：\\n{refine_query}\"}\n\
          \        ],\n        \"stream\": False,\n        \"think\": False,\n   \
          \     \"options\": {\n            \"temperature\": 0,\n            \"format\"\
          : \"json\", # 强制 JSON 以保证逻辑稳定性\n            \"num_predict\": 1000\n    \
          \    }\n    }\n\n    try:\n        conn = http.client.HTTPConnection(HOST,\
          \ PORT, timeout=300)\n        conn.request(\"POST\", \"/api/chat\", json.dumps(payload),\
          \ {\"Content-Type\": \"application/json\"})\n        res = conn.getresponse()\n\
          \        raw_data = res.read().decode('utf-8')\n        conn.close()\n\n\
          \        # [物理审计]：解析完整响应以提取 Token 指标\n        full_res = json.loads(raw_data)\n\
          \        input_tokens = full_res.get(\"prompt_eval_count\", 0)\n       \
          \ output_tokens = full_res.get(\"eval_count\", 0)\n        total_tokens\
          \ = input_tokens + output_tokens\n\n        # [3] 解析并强制提取标准化字符串\n      \
          \  ai_res = full_res.get(\"message\", {}).get(\"content\", \"\").strip()\n\
          \        # 物理切除思维链内容\n        clean_text = re.sub(r'<think>.*?</think>',\
          \ '', ai_res, flags=re.DOTALL).strip()\n        \n        # 提取 JSON 中的 normalized_result\n\
          \        json_match = re.search(r'\\{.*\\}', clean_text, re.DOTALL)\n  \
          \      if json_match:\n            data = json.loads(json_match.group())\n\
          \            # 优先级排序：normalized_result > updated_context\n            result\
          \ = data.get(\"normalized_result\", data.get(\"updated_context\", \"\"))\n\
          \            # 兜底：如果字段缺失，依据 facts 字典动态拼装\n            if not result and\
          \ \"facts\" in data:\n                f = data[\"facts\"]\n            \
          \    result = f\"（一）出差人员乘坐城市间交通工具应不超过以下标准 | {f.get('职级','待核实')} | {f.get('目的地','待核实')}\
          \ | {f.get('交通工具','待核实')} | {f.get('事由','待核实')} | {f.get('经费性质','待核实')}\"\
          \n        else:\n            result = clean_text\n\n        return {\n \
          \           \"result\": result,\n            # --- 物理注入 Token 统计 ---\n \
          \           \"input_tokens\": str(input_tokens),\n            \"output_tokens\"\
          : str(output_tokens),\n            \"total_tokens\": str(total_tokens)\n\
          \        }\n\n    except Exception as e:\n        # 异常链路物理熔断，Token 计数强制归零以防变量污染\n\
          \        return {\n            \"result\": f\"标准化算子逻辑坍塌: {str(e)}\",\n \
          \           \"input_tokens\": \"0\",\n            \"output_tokens\": \"\
          0\",\n            \"total_tokens\": \"0\"\n        }"
