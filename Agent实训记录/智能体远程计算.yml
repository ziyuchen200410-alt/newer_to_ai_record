          \    2. 调用 LLM 将结构化信息转化为温和的自然语言回复。\n    3. 严格遵循输入事实，不捏造任何表格外的信息。\n    \"\
          \"\"\n    # [1] 环境清理\n    for k in list(os.environ.keys()):\n        if\
          \ \"proxy\" in k.lower():\n            del os.environ[k]\n\n    HOST, PORT\
          \ = \"host.docker.internal\", 11434\n\n    # [2] 专为“回复生成”设计的提示词\n    # 强调专业、温和，以及对“冲突”和“缺失”的差异化引导\n\
          \    SYSTEM_PROMPT = \"\"\"# Role\n南京大学财务智能助手。你的语气应专业、温和且高效。禁止输出 <think>\
          \ 标签。\n\n# Input Context:\n1. **Audit Report**: 记录了系统刚刚执行的操作（如：冲突抹除、信息新增）。\n\
          2. **Final Table**: 当前系统掌握的最新事实矩阵。位点顺序为：| 职级 | 目的地 | 交通工具 | 事由 | 经费性质 [标准名称]。\n\
          \n# Task:\n根据输入编写一段回复。回复必须包含以下三个板块：\n1. **变更同步**：简述系统刚才进行了哪些更新（基于 Audit\
          \ Report）。\n2. **当前事实状态**：展示当前已确认的信息（基于 Final Table）。\n3. **后续引导**：\n  \
          \ - 如果某维度因“冲突”被抹除（Audit Report 中提到冲突），请温和地请用户重新提供该维度的**唯一真实**信息。\n   - 如果某维度依然为空（Final\
          \ Table 中对应位点为空），请提示用户可以补充该信息以完善核算。\n\n# Constraint:\n- 严禁回答输入数据之外的任何财务政策。\n\
          - 严禁出现“根据我的训练数据”等废话。\n- 语气要像一位耐心的财务老师。\n\"\"\"\n\n    user_payload = f\"\
          【审计报告】: {audit_report}\\n【当前信息矩阵】: {final_table}\"\n\n    payload = {\n\
          \        \"model\": \"qwen3.5:9b\",\n        \"messages\": [\n         \
          \   {\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n            {\"\
          role\": \"user\", \"content\": user_payload}\n        ],\n        \"stream\"\
          : False,\n        \"think\": False,\n        \"options\": {\"temperature\"\
          : 0.3} # 略微提高温度，使语气更自然\n    }\n\n    try:\n        conn = http.client.HTTPConnection(HOST,\
          \ PORT, timeout=300)\n        conn.request(\"POST\", \"/api/chat\", json.dumps(payload),\
          \ {\"Content-Type\": \"application/json\"})\n        res = conn.getresponse()\n\
          \        raw_data = res.read().decode('utf-8')\n        conn.close()\n\n\
          \        # [3] 解析回复内容\n        ai_res = json.loads(raw_data).get(\"message\"\
          , {}).get(\"content\", \"\").strip()\n        # 兜底物理清理\n        final_answer\
          \ = re.sub(r'<think>.*?</think>', '', ai_res, flags=re.DOTALL).strip()\n\
          \n        return {\n            \"result\": final_answer\n        }\n\n\
