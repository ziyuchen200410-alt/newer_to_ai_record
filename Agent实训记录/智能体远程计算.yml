    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(table_audit_info:\
          \ str, rule_audit_info: str, refine_query: str):\n    \"\"\"\n    节点 1.3：综合审计终审官\n\
          \    排版逻辑：采用“元数据-载荷-执行”三段式解耦，物理规避缩进污染与高亮冲突。\n    \"\"\"\n    # [1] 物理环境初始化\n\
          \    for k in [k for k in os.environ if \"proxy\" in k.lower()]:\n     \
          \   del os.environ[k]\n\n    HOST, PORT = \"host.docker.internal\", 11434\n\
          \n    # [2] 指令模版定义 (使用列表 join 确保物理缩进对齐)\n    system_lines = [\n        \"\
          # Role: 南京大学财务综合审计官\",\n        \"# Audit Logic:\",\n        \"1. 逻辑对撞：检查【规则】是否对【表格限额】有修正作用。\"\
          ,\n        \"2. 确定性判定：事实完备则给出确切结论；缺失则进行政策引导。\",\n        \"3. 真实性原则：严禁回答文件中未提及的任何数值。\"\
          ,\n        \"# Examples:\",\n        \"- [对撞成功]: 教授+北京+科研经费 -> 700限额 * 1.5\
          \ = 1050元/天。\",\n        \"- [引导补全]: 仅有地名 -> 告知政策框架，引导补充职级。\",\n       \
          \ \"# Output Style:\",\n        \"- 结构化：【审计结论】+【判定依据】+【特别提醒】。\",\n     \
          \   \"- 语气：客观、温和、严谨。\"\n    ]\n    SYSTEM_PROMPT = \"\\n\".join(system_lines)\n\
          \n    # [3] 载荷物理构造 (利用括号实现隐式换行，保持完美的函数缩进)\n    user_payload = (\n      \
          \  \"### 1. 表格核算硬数据\\n\" + table_audit_info + \"\\n\\n\"\n        \"###\
          \ 2. 文字例外规则集\\n\" + rule_audit_info + \"\\n\\n\"\n        \"### 3. 当前事实背景\
          \ (Refine Query)\\n\" + refine_query\n    )\n\n    # [4] 构造 API 请求矩阵\n \
          \   payload = {\n        \"model\": \"qwen3.5:9b  \",\n        \"messages\"\
          : [\n            {\"role\": \"system\", \"content\": SYSTEM_PROMPT},\n \
          \           {\"role\": \"user\", \"content\": user_payload}\n        ],\n\
          \        \"stream\": False,\n        \"think\": False,\n        \"options\"\
          : {\n            \"temperature\": 0.2,\n            \"num_predict\": 1000\n\
          \        }\n    }\n\n    # [5] 物理执行与异常捕获\n    try:\n        conn = http.client.HTTPConnection(HOST,\
          \ PORT, timeout=300)\n        conn.request(\"POST\", \"/api/chat\", json.dumps(payload),\
          \ {\"Content-Type\": \"application/json\"})\n        \n        response\
          \ = conn.getresponse()\n        raw_answer = response.read().decode('utf-8')\n\
          \        conn.close()\n\n        # [物理审计]：解析完整响应体以提取 Token 计数\n        full_res\
          \ = json.loads(raw_answer)\n        input_tokens = full_res.get(\"prompt_eval_count\"\
          , 0)\n        output_tokens = full_res.get(\"eval_count\", 0)\n        total_tokens\
          \ = input_tokens + output_tokens\n\n        # 提取 Payload 并物理切除思维链内容 [cite:\
          \ 2026-02-26]\n        full_text = full_res.get(\"message\", {}).get(\"\
          content\", \"\").strip()\n        final_report = re.sub(r'<think>.*?</think>',\
          \ '', full_text, flags=re.DOTALL).strip()\n\n        return {\n        \
          \    \"final_audit_report\": final_report,\n            # --- 返回 Token 消耗数据\
          \ ---\n            \"input_tokens\": str(input_tokens),\n            \"\
          output_tokens\": str(output_tokens),\n            \"total_tokens\": str(total_tokens)\n\
          \        }\n\n    except Exception as audit_error:\n        # 异常链路物理熔断，Token\
          \ 计数归零\n        return {\n            \"final_audit_report\": f\"【审计内核异常】:\
          \ {str(audit_error)}\",\n            \"input_tokens\": \"0\",\n        \
          \    \"output_tokens\": \"0\",\n            \"total_tokens\": \"0\"\n  \
          \      }"
        code_language: python3
