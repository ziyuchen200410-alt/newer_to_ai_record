    - data:
        code: "import http.client\nimport json\nimport os\nimport re\n\ndef main(result:\
          \ list, refine_query: str):\n    \"\"\"\n    节点 1.1：表格矩阵审计官 (逻辑闭环版)\n  \
          \  物理任务：1. 表头焊接；2. 完备性自检；3. 逻辑回溯(返回整行)；4. Token 消耗统计。\n    \"\"\"\n    #\
          \ [1] 环境清理\n    for key in list(os.environ.keys()):\n        if \"proxy\"\
          \ in key.lower():\n            del os.environ[key]\n\n    HOST, PORT = \"\
          host.docker.internal\", 11434\n    \n    # [2] 物理指纹与表头定义\n    T1_SIG = \"\
          （一）出差人员乘坐城市间交通工具应不超过以下标准\"\n    T1_HDR = \"| 标准 | 职级/职务标准 | 经费性质 | 火车(含高铁/动车)\
          \ | 轮船 | 飞机 |\"\n    \n    T2_SIG = \"（二）南京大学国（境）内差旅住宿费限额标准明细表\"\n    T2_HDR\
          \ = \"| 序号 | 地区(城市) | 一类| 二类| 三类 | 旺季地区 | 旺季期间 | 一类 | 二类 | 三类 |\"\n\n  \
          \  table_segments = []\n    for item in result:\n        content = item.get('content',\
          \ '')\n        if T1_SIG in content:\n            table_segments.append(f\"\
          ### [交通工具标准]\\n{T1_HDR}\\n|---|---|---|---|---|---|\\n{content}\")\n   \
          \     elif T2_SIG in content:\n            table_segments.append(f\"###\
          \ [住宿限额标准]\\n{T2_HDR}\\n|---|---|---|---|---|---|---|---|---|---|\\n{content}\"\
          )\n\n    # 物理熔断\n    if not table_segments:\n        return {\"table_audit_info\"\
          : \"未探测到物理表格指纹。\", \"has_table\": \"false\", \"is_complete\": \"false\"\
          , \"total_tokens\": \"0\"}\n\n    # [3] 构造具有“生产辅助”和“逻辑拦截”能力的 Prompt\n  \
          \  system_content = \"\"\"# Role\n南京大学财务矩阵审计员。你的核心任务是执行“行锁定”审计。\n\n# Audit\
          \ Logic (强制执行):\n1. **要素核对**: 检查 [职级]、[目的地] 是否明确。\n2. **逻辑拦截 (重要)**: \n\
          \   - **信息完备**: 如果职级明确，锁定具体数值。\n   - **信息缺失**: 如果未提供职级，禁止默认一类。如果提供了月份，则需要核对是否是旺季，如果没有提供，禁止默认旺季。必须锁定对应地区的【整行数据】并返回，要求用户对照。\n\
          3. **输出格式**: 必须输出 Strict JSON。\n\n# Few-shot Examples:\n- **场景 A (信息足)**:\n\
          \  * 用户: \"正高，去北京\"\n  * JSON: {\"is_complete\": true, \"audit_conclusion\"\
          : \"北京住宿限额1100元/天。\", \"locked_row\": \"| 1 | 北京 | 1100 | 900 | 600 |...\"\
          , \"mapping_logic\": \"职级匹配一类，锁定北京行。\"}\n\n- **场景 B (缺失职级 - 返回整行)**:\n \
          \ * 用户: \"北京住宿标准是多少？\"\n  * JSON: {\"is_complete\": false, \"audit_conclusion\"\
          : \"缺失职级要素。请根据职级核对北京标准：\", \"locked_row\": \"| 1 | 北京 | 一类:1100 | 二类:900\
          \ | 三类:600 |\", \"mapping_logic\": \"信息不完备，执行整行回溯逻辑。\"}\n\n# Output (STRICT\
          \ JSON):\n{\n  \"is_complete\": boolean,\n  \"audit_conclusion\": \"结论\"\
          ,\n  \"locked_row\": \"锁定的原始表格行内容\",\n  \"mapping_logic\": \"判定过程\"\n}\"\
          \"\"\n\n    # [4] 物理请求矩阵\n    payload = {\n        \"model\": \"qwen3.5:9b\"\
          ,\n        \"messages\": [\n            {\"role\": \"system\", \"content\"\
          : system_content},\n            {\"role\": \"user\", \"content\": f\"【焊接表格】：\\\
          n\" + \"\\n\".join(table_segments) + f\"\\n\\n【事实背景】：\\n{refine_query}\"\
          }\n        ],\n        \"stream\": False,\n        \"think\": False, # 物理关闭深度思考模式\n\
          \        \"options\": {\n            \"temperature\": 0.1, # 保持审计结果确定性\n\
          \            \"format\": \"json\"\n        }\n    }\n    \n    try:\n  \
          \      conn = http.client.HTTPConnection(HOST, PORT, timeout=300)\n    \
          \    conn.request(\"POST\", \"/api/chat\", json.dumps(payload), {\"Content-Type\"\
          : \"application/json\"})\n        res = conn.getresponse()\n        raw_data\
          \ = res.read().decode('utf-8')\n        conn.close()\n\n        # [5] 物理审计：解析全文提取\
          \ Token 计数\n        full_res = json.loads(raw_data)\n        input_tokens\
          \ = full_res.get(\"prompt_eval_count\", 0)\n        output_tokens = full_res.get(\"\
          eval_count\", 0)\n        total_tokens = input_tokens + output_tokens\n\
          \        \n        # [6] 健壮解析与思维链切除\n        ai_raw = full_res.get(\"message\"\
          , {}).get(\"content\", \"\").strip()\n        # 物理切除可能的 <think> 标签残留\n \
          \       clean_json = re.sub(r'<think>.*?</think>', '', ai_raw, flags=re.DOTALL).strip()\n\
          \        data = json.loads(re.search(r'\\{.*\\}', clean_json, re.DOTALL).group())\n\
          \n        # [7] 构造可视化输出报告\n        is_complete = data.get(\"is_complete\"\
          , False)\n        status_icon = \"✅\" if is_complete else \"⚠️\"\n     \
          \   \n        audit_report = (\n            f\"### {status_icon} 财务矩阵审计快照\\\
          n\"\n            f\"**结论**：{data.get('audit_conclusion')}\\n\\n\"\n    \
          \        f\"**物理锁定参考行**：\\n{data.get('locked_row')}\\n\\n\"\n          \
          \  f\"**审计逻辑**：{data.get('mapping_logic')}\"\n        )\n\n        return\
          \ {\n            \"table_audit_info\": audit_report,\n            \"has_table\"\
          : \"true\",\n            \"is_complete\": str(is_complete).lower(),\n  \
          \          \"input_tokens\": str(input_tokens),\n            \"output_tokens\"\
          : str(output_tokens),\n            \"total_tokens\": str(total_tokens)\n\
          \        }\n    except Exception as e:\n        return {\n            \"\
          table_audit_info\": f\"表格审计算子崩溃：{str(e)}\", \n            \"has_table\"\
          : \"false\",\n            \"is_complete\": \"false\",\n            \"input_tokens\"\
          : \"0\", \"output_tokens\": \"0\", \"total_tokens\": \"0\"\n        }"
        code_language: python3
        outputs:
          has_table:
            children: null
