          \    SYSTEM_PROMPT = \"\"\"# Role\n财务矩阵提取官。只输出 JSON，严禁输出 <think> 标签。\n\n\
          # Dimensions to Map:\n1. rank: 职级（如：正高、副高、中级、教授、副教授）。\n2. dest: 目的地（如：北京、南京）。\n\
          3. var: 交通工具（如：飞机、高铁、硬卧）。\n4. reason: 事由（如：出差、调研、会议）。\n5. fund: 经费性质（如：横向、行政事业、纵向）。\n\
          \n# Mapping Rules:\n- **维度定义修正**: 确认第三维度(var)仅指代“交通工具”，严禁混入其他语义。\n- **名字完整性**:\
          \ 检查每一个输出变量必须是完整的名词。严禁任何形式的字符截断（如：严禁将“飞机”缩写为“机”）。\n- **职级绝对隔离**: 职级实体只能映射到\
          \ rank 字段。若同时出现“正高”和“教授”，仅保留“正高”。\n- **动作降维**: 仅保留名词。在提取阶段由模型剔除“坐”、“乘”、“去”等动词前缀。\n\
          - **空值约定**: 缺失项返回空字符串 \"\"。\n\"\"\"\n\n    payload = {\n        \"model\"\
          : \"qwen3.5:9b\",\n        \"messages\": [\n            {\"role\": \"system\"\
          , \"content\": SYSTEM_PROMPT},\n            {\"role\": \"user\", \"content\"\
          : f\"INPUT_STREAM: {input_data}\"}\n        ],\n        \"stream\": False,\
          \ \"think\": False,\n        \"options\": {\"temperature\": 0, \"format\"\
          : \"json\"}\n    }\n\n    try:\n        conn = http.client.HTTPConnection(HOST,\
          \ PORT, timeout=300)\n        conn.request(\"POST\", \"/api/chat\", json.dumps(payload),\
          \ {\"Content-Type\": \"application/json\"})\n        res = conn.getresponse()\n\
          \        raw_data = res.read().decode('utf-8')\n        conn.close()\n\n\
          \        # [物理审计]：解析完整响应以提取 Token 指标\n        full_res = json.loads(raw_data)\n\
          \        input_tokens = full_res.get(\"prompt_eval_count\", 0)\n       \
          \ output_tokens = full_res.get(\"eval_count\", 0)\n        total_tokens\
          \ = input_tokens + output_tokens\n\n        # [4] 解析与清洗\n        ai_res\
          \ = full_res.get(\"message\", {}).get(\"content\", \"\").strip()\n     \
          \   # 物理切除思维链内容，确保 JSON 纯净\n        clean_json = re.sub(r'<think>.*?</think>',\
          \ '', ai_res, flags=re.DOTALL).strip()\n        data = json.loads(re.search(r'\\\
          {.*\\}', clean_json, re.DOTALL).group())\n\n        # [5] 物理脱水函数：修正动词剔除逻辑，保护专有名词\n\
          \        def dehydrate(v):\n            if not v or v in [\"待核实\", \"未知\"\
          , \"None\"]: return \"\"\n            v_str = str(v).strip()\n         \
          \   # 仅移除字符串开头的动词性前缀\n            v_str = re.sub(r'^[坐乘去往到]', '', v_str)\n\
          \            return v_str\n\n        # [6] 按照位点对齐组装向量\n        parts = [\n\
          \            dehydrate(data.get(\"rank\", \"\")),\n            dehydrate(data.get(\"\
          dest\", \"\")),\n            dehydrate(data.get(\"var\", \"\")),\n     \
          \       dehydrate(data.get(\"reason\", \"\")),\n            dehydrate(data.get(\"\
          fund\", \"\"))\n        ]\n        \n        # 构造最终表格字符串\n        final_table\
          \ = f\"| {' | '.join(parts)} | {suffix}\".strip()\n        final_table =\
          \ re.sub(r'\\s\\|\\s$', '', final_table)\n\n        return {\n         \
          \   \"result_table\": final_table,\n            # --- 物理注入 Token 统计 ---\n\
          \            \"input_tokens\": str(input_tokens),\n            \"output_tokens\"\
          : str(output_tokens),\n            \"total_tokens\": str(total_tokens)\n\
          \        }\n\n    except Exception as e:\n        # 异常链路物理熔断，Token 计数归零以防下游变量错误\n\
          \        return {\n            \"result_table\": f\"CRITICAL_FAILURE: {str(e)}\"\
          ,\n            \"input_tokens\": \"0\",\n            \"output_tokens\":\
          \ \"0\",\n            \"total_tokens\": \"0\"\n        }"
