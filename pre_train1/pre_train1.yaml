### model
model_name_or_path: ./models/qwen/Qwen2.5-VL-7B-Instruct
trust_remote_code: true

### method
stage: pt
do_train: true
finetuning_type: lora
lora_target: all
lora_rank: 128
lora_alpha: 256
lora_dropout: 0.05

### dataset
dataset: medical_books_all
cutoff_len: 2048
max_samples: 100000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: saves/pre_train1
logging_steps: 5
save_steps: 100
plot_loss: true
overwrite_output_dir: true

### train
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2e-5
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_steps: 100
fp16: true
flash_attn: fa2
packing: true

### eval
val_size: 0.05
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 500
